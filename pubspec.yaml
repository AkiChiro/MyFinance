name: myfinance
description: "MyFinance — personal finance tracker (offline, VND-only, Vietnamese)."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Local database (offline). Requires codegen: `dart run build_runner build`.
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # CSV import/export + sharing
  csv: ^6.0.0
  file_picker: ^8.1.2
  share_plus: ^12.0.0

  # IDs that are unique across devices (so CSV merge-by-id is safe) + formatting
  uuid: ^4.4.2
  intl: any  # pinned transitively by flutter_localizations

  # P2 — charts
  fl_chart: ^0.69.0

  # P3 — persistent notification + home-screen widget
  flutter_local_notifications: ^17.2.4
  home_widget: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/keywords.json
